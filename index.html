<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>優待手帳</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#174A3F">
<style>
:root{
  --bg:#F1F4F0; --card:#FFFFFF; --ink:#1E2B26; --muted:#66756E; --line:#E1E7E1;
  --green:#174A3F; --green-deep:#0F332C; --green-soft:#E4EEE9;
  --gold:#C79A3B; --red:#B3372B; --amber:#C0781D;
  --sbi:#0068B7; --rakuten:#BF0000; --monex:#E88F00;
  --radius:14px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic UI",sans-serif;
  font-size:15px; line-height:1.6;
  padding-bottom:96px;
}
header{
  background:var(--green); color:#fff;
  padding:calc(env(safe-area-inset-top) + 8px) 16px 0;
  position:sticky; top:0; z-index:20;
}
.hd-title{font-size:15px; font-weight:800; letter-spacing:.14em; display:flex; align-items:baseline; gap:8px;}
.hd-title small{font-size:9px; font-weight:500; letter-spacing:.08em; opacity:.7;}
nav{display:flex; gap:2px; margin-top:4px;}
nav button{
  flex:1; background:transparent; border:none; color:rgba(255,255,255,.65);
  font:inherit; font-size:11.5px; font-weight:700; padding:6px 0 8px; cursor:pointer;
  border-bottom:3px solid transparent; white-space:nowrap; letter-spacing:0;
}
nav button.active{color:#fff; border-bottom-color:var(--gold);}

/* 口座切替タブ（残額詳細・マスタ編集） */
.acct-tabs{display:flex; gap:6px; margin-bottom:12px;}
.acct-tabs button{
  flex:1; font:inherit; font-size:13px; font-weight:800; padding:9px 0;
  border-radius:10px; border:1.5px solid #CBD6CE; background:#fff; color:var(--muted); cursor:pointer;
}
.acct-tabs button.on{background:var(--green); color:#fff; border-color:var(--green);}

/* 期限月の複数選択チップ */
.chipbar{display:flex; gap:6px; overflow-x:auto; margin-bottom:10px; padding-bottom:2px; -webkit-overflow-scrolling:touch;}
.fchip{
  flex-shrink:0; font:inherit; font-size:12px; font-weight:700; padding:4px 12px;
  border-radius:99px; border:1px solid #CBD6CE; background:#fff; color:var(--muted); cursor:pointer;
}
.fchip.on{background:var(--green); color:#fff; border-color:var(--green);}

/* 消費ペース表示 */
.t-pace{font-size:10px; font-weight:700; color:var(--amber); font-variant-numeric:tabular-nums;}

/* 有効期限選択モーダル */
.modal-bg{position:fixed; inset:0; background:rgba(15,40,33,.45); z-index:40; display:flex; align-items:flex-end; justify-content:center;}
.modal{
  background:#fff; border-radius:18px 18px 0 0; width:100%; max-width:640px;
  padding:18px 16px calc(env(safe-area-inset-bottom) + 18px); box-shadow:0 -6px 24px rgba(15,40,33,.25);
}
.modal h3{font-size:15px; font-weight:800; margin-bottom:4px;}
.modal .sub{margin-bottom:12px;}
.modal-opt{
  display:flex; justify-content:space-between; align-items:center; width:100%;
  font:inherit; font-size:14.5px; font-weight:700; color:var(--ink);
  background:#FAFCFA; border:1.5px solid #CBD6CE; border-radius:12px;
  padding:12px 14px; margin-bottom:8px; cursor:pointer;
}
.modal-opt .mo-bal{font-variant-numeric:tabular-nums; color:var(--green); font-weight:800;}
.modal-cancel{width:100%; font:inherit; font-size:14px; font-weight:700; color:var(--muted); background:none; border:none; padding:8px 0 0; cursor:pointer;}

/* メモ内リンク */
.memo-link{margin-top:4px; font-size:12.5px; font-weight:700;}
.memo-link a{color:var(--green);}

/* 残額ログ関連 */
.pending-note{margin-top:5px; font-size:12px; font-weight:600; color:var(--muted); line-height:1.5;}
.diff-plus{color:var(--green) !important;}
.diff-minus{color:var(--red) !important;}
.log-memo{font-size:11.5px; color:var(--muted); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
main{max-width:640px; margin:0 auto; padding:16px 14px;}
h2{font-size:16px; font-weight:800; margin:4px 2px 12px; letter-spacing:.04em;}
.sub{font-size:12px; color:var(--muted);}
.row-between{display:flex; justify-content:space-between; align-items:center; gap:8px;}

/* ------- チケット型カード（一覧のシグネチャ要素） ------- */
.ticket{
  background:var(--card); border-radius:var(--radius); margin-bottom:8px;
  display:flex; position:relative; overflow:hidden; cursor:pointer;
  box-shadow:0 1px 3px rgba(20,50,40,.08);
  border:1px solid var(--line);
}
.ticket:active{transform:scale(.99);}
.t-main{flex:1; padding:7px 12px; min-width:0;}
.t-stub{
  width:108px; flex-shrink:0; padding:7px 10px;
  border-left:2px dashed #CBD6CE;
  display:flex; flex-direction:column; justify-content:center; align-items:flex-end;
  background:linear-gradient(180deg,#FBFCFA,#F3F6F2);
  position:relative;
}
.ticket::before,.ticket::after{
  content:""; position:absolute; width:14px; height:14px; border-radius:50%;
  background:var(--bg); border:1px solid var(--line);
  right:calc(108px - 7px); z-index:2;
}
.ticket::before{top:-8px;} .ticket::after{bottom:-8px;}
.t-code{font-size:10px; color:var(--muted); font-weight:600; letter-spacing:.06em;}
.t-name{font-size:14px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.t-meta{display:flex; flex-wrap:wrap; gap:5px; margin-top:3px; align-items:center;}
.t-balance{font-size:17px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--green);}
.t-balance small{font-size:11px; font-weight:600; color:var(--muted); margin-left:2px;}
.t-balance.zero{color:#9AA8A1; text-decoration:line-through;}
.t-exp{font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums;}

.chip{display:inline-block; font-size:10.5px; font-weight:700; padding:1px 8px; border-radius:99px; letter-spacing:.03em;}
.chip.days-ok{background:var(--green-soft); color:var(--green);}
.chip.days-warn{background:#F7ECD9; color:var(--amber);}
.chip.days-danger{background:#F6E2DF; color:var(--red);}
.chip.acct{color:#fff;}
.chip.acct.SBI{background:var(--sbi);} .chip.acct.楽天{background:var(--rakuten);} .chip.acct.マネックス{background:var(--monex);}
.chip.form{background:#EDEFEA; color:#55655E;}
.chip.used{background:#E8E8E4; color:#8A948E;}

/* 銘柄行内の証券口座別明細 */
.t-sub{margin-top:4px; border-top:1px dashed #E4E9E4; padding-top:3px; display:flex; flex-direction:column; gap:2px;}
.t-subrow{display:flex; align-items:center; gap:7px; font-variant-numeric:tabular-nums;}
.t-subrow .chip.acct{font-size:9px; padding:0 6px;}
.t-subbal{font-size:11.5px; font-weight:700; color:var(--ink);}
.t-subbal small{font-size:9px; font-weight:600; color:var(--muted); margin-left:1px;}
.t-substat{font-size:10px; font-weight:700;}
.t-substat.ok{color:var(--green);}
.t-substat.ng{color:var(--amber);}

/* 期限1か月前の通知バナー */
.notice{
  display:flex; align-items:center; gap:8px;
  background:#F7ECD9; color:#8A5B12; border:1px solid #E8D3AC;
  border-radius:12px; padding:8px 12px; font-size:12.5px; font-weight:600; margin-bottom:10px;
}
.notice button{margin-left:auto; flex-shrink:0; background:none; border:none; font-size:17px; line-height:1; color:#8A5B12; cursor:pointer; padding:0 2px;}

/* ------- カード（詳細・フォーム） ------- */
.card{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px 14px; margin-bottom:14px; box-shadow:0 1px 3px rgba(20,50,40,.06);
}
.field{margin-bottom:12px;}
.field label{display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:4px;}
input[type=text],input[type=number],input[type=date],input[type=url],input[type=password],select{
  width:100%; min-width:0; font:inherit; font-size:16px; padding:9px 12px;
  border:1px solid #CBD6CE; border-radius:10px; background:#FDFEFD; color:var(--ink);
}
input[type=date]{-webkit-appearance:none; appearance:none; min-height:44px;}
input:focus,select:focus{outline:2px solid var(--green); outline-offset:1px; border-color:var(--green);}
input:disabled{background:#EEF1ED; color:#7B8781;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
.grid2 > .field,.grid3 > .field{min-width:0;}
/* 優待回ブロック：真ん中（有効期限）を広めにして「12か月後」の見切れを防ぐ */
.kai-block .grid3{grid-template-columns:0.85fr 1.35fr 0.8fr; gap:6px;}
.kai-block select{padding:9px 6px;}
.seg{display:flex; border:1px solid #CBD6CE; border-radius:10px; overflow:hidden;}
.seg button{flex:1; font:inherit; font-size:14px; font-weight:700; padding:9px 0; border:none; background:#FDFEFD; color:var(--muted); cursor:pointer;}
.seg button.on{background:var(--green); color:#fff;}
.kai-block{border:1px dashed #CBD6CE; border-radius:12px; padding:12px; margin-bottom:12px; background:#FAFCFA;}
.kai-block h4{font-size:13px; color:var(--green); margin-bottom:8px;}

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  font:inherit; font-size:15px; font-weight:800; letter-spacing:.05em;
  padding:12px 18px; border-radius:12px; border:none; cursor:pointer; width:100%;
}
.btn.primary{background:var(--green); color:#fff;}
.btn.primary:active{background:var(--green-deep);}
.btn.ghost{background:transparent; color:var(--green); border:1.5px solid var(--green);}
.btn.danger{background:transparent; color:var(--red); border:1.5px solid var(--red);}
.btn.small{width:auto; padding:7px 14px; font-size:13px; border-radius:9px;}
.btn:disabled{opacity:.45;}
.btn-row{display:flex; gap:10px; margin-top:14px;}

.back{background:none; border:none; font:inherit; color:var(--green); font-weight:700; font-size:14px; padding:0; cursor:pointer; margin-bottom:12px;}

/* トグルスイッチ */
.switch{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; user-select:none;}
.switch input{display:none;}
.sw-track{width:40px; height:24px; border-radius:99px; background:#CBD6CE; position:relative; transition:.15s;}
.sw-track::after{content:""; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; transition:.15s;}
.switch input:checked + .sw-track{background:var(--green);}
.switch input:checked + .sw-track::after{left:19px;}

/* 詳細画面の明細 */
.d-head{padding:14px; border-radius:var(--radius); background:var(--green); color:#fff; margin-bottom:14px;}
.d-head .name{font-size:17px; font-weight:800;}
.d-head .total{font-size:26px; font-weight:800; font-variant-numeric:tabular-nums; color:#F5D98B;}
.kv{display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #F0F3EF; font-size:13.5px;}
.kv .k{color:var(--muted); flex-shrink:0; margin-right:12px;}
.kv .v{text-align:right; word-break:break-all; font-variant-numeric:tabular-nums;}
.kv .v a{color:var(--green); font-weight:700;}
.copybtn{font:inherit; font-size:11px; font-weight:700; border:1px solid #CBD6CE; background:#fff; color:var(--green); border-radius:7px; padding:1px 8px; margin-left:6px; cursor:pointer;}
.balance-edit{display:flex; gap:6px; align-items:stretch;}
.balance-edit input{flex:1; min-width:72px; font-size:17px; font-weight:800; text-align:right; font-variant-numeric:tabular-nums;}
.qbtn{
  flex-shrink:0; white-space:nowrap; font:inherit; font-size:12.5px; font-weight:800;
  padding:0 10px; border-radius:9px; border:1.5px solid var(--green);
  background:#fff; color:var(--green); cursor:pointer;
}
.qbtn:active{background:var(--green-soft);}
.qbtn.zero{border-color:var(--red); color:var(--red);}
.qbtn.zero:active{background:#F6E2DF;}

/* 集計サマリー */
.summary{display:flex; background:var(--green); color:#fff; border-radius:var(--radius); padding:9px 4px; margin-bottom:10px;}
.summary > div{flex:1; text-align:center; border-right:1px solid rgba(255,255,255,.18);}
.summary > div:last-child{border-right:none;}
.summary .s-label{display:block; font-size:10px; opacity:.75; letter-spacing:.08em;}
.summary .s-val{font-size:15px; font-weight:800; font-variant-numeric:tabular-nums;}
.summary .s-val small{font-size:10px; font-weight:600; opacity:.8;}

/* ソート・絞り込みツールバー */
.toolbar{display:flex; gap:6px; margin-bottom:10px;}
.toolbar select,.toolbar input{
  flex:1; min-width:0; font:inherit; font-size:13px; padding:6px 8px;
  border:1px solid #CBD6CE; border-radius:8px; background:#fff; color:var(--ink);
}
.fab{
  position:fixed; right:18px; bottom:calc(env(safe-area-inset-bottom) + 20px); z-index:15;
  background:var(--green); color:#fff; border:none; border-radius:99px;
  font:inherit; font-size:15px; font-weight:800; letter-spacing:.05em;
  padding:14px 22px; box-shadow:0 4px 14px rgba(15,51,44,.35); cursor:pointer;
}
.empty{text-align:center; color:var(--muted); padding:48px 10px; font-size:14px;}
.err{background:#F6E2DF; color:var(--red); border-radius:10px; padding:10px 12px; font-size:13px; font-weight:600; margin-bottom:12px;}
#toast{
  position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 90px); transform:translateX(-50%) translateY(20px);
  background:var(--green-deep); color:#fff; font-size:13px; font-weight:600;
  padding:10px 18px; border-radius:99px; opacity:0; transition:.25s; z-index:50; pointer-events:none;
  max-width:88vw; text-align:center;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<header>
  <div class="hd-title">優待手帳 <small>KABUNUSHI YUTAI LEDGER</small></div>
  <nav>
    <button id="nav-list" class="active">残高(日付別)</button>
    <button id="nav-bycode">残高(銘柄別)</button>
    <button id="nav-log">ログ</button>
    <button id="nav-master">銘柄マスタ</button>
  </nav>
</header>
<main id="app"><div class="empty">読み込み中…</div></main>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ================= Supabase 設定（ここを書き換えてください） ================= */
const SUPABASE_URL      = "https://czcuyizwgrrpyibnosmr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6Y3V5aXp3Z3JycHlpYm5vc21yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNTA3NjcsImV4cCI6MjA5ODcyNjc2N30.2Y9X-xtPOHpU9-f2ydOLm3bPkr7iiV3_OX1lsHnfQwQ";
/* ======================================================================== */

const ACCOUNTS = ["SBI","楽天","マネックス"];
const FORMATS  = ["紙","電子","アプリ"];
const TYPES    = ["金額","枚数"];

let sb = null;
let masters = [];   // yutai_master
let balances = [];  // yutai_balance
let logs = [];      // yutai_log（残額ログ。null=テーブル未作成）
let showUsed = false;
let showUnrecvOnly = false; // 受取なしのみ表示（受取済の更新漏れ確認用）
let noticeDismissed = false; // 期限1か月前通知を閉じたか（セッション内で保持）
let listMonths = new Set();  // 日付別：期限月(yyyy-mm)の複数選択（空=すべて）
let byCodeSort = "codeAsc";  // 銘柄別のソート
let lastList = null;         // 詳細から戻る先（日付別 or 銘柄別）
let view = { name:"list" };

/* テキスト中のURLをリンク化して返す（エスケープ済み） */
function linkify(s){
  return esc(s).replace(/(https?:\/\/[^\s<>"']+)/g,
    u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
}
/* 今月を1か月目として有効期限月までの月数（例：7/5→8/31 は 2） */
function monthsUntil(iso){
  const n = new Date(), e = new Date(iso + "T00:00:00");
  return (e.getFullYear() - n.getFullYear()) * 12 + (e.getMonth() - n.getMonth()) + 1;
}
/* 単純案分の消費ペース（円or枚/月、小数点切り上げ）。対象外はnull */
function paceOf(total, expiry){
  if(!(total > 0) || daysLeft(expiry) < 0) return null;
  const m = Math.max(1, monthsUntil(expiry));
  return Math.ceil(total / m);
}

/* 残額詳細：未保存の変更があるかを判定して離脱時に確認する */
function detailHasChanges(){
  return [...app.querySelectorAll("input[data-orig]")]
    .some(el => String(el.value) !== String(el.dataset.orig));
}
function confirmLeaveDetail(){
  if(view.name === "detail" && detailHasChanges()){
    return confirm("変更内容が保存されていません。\n保存せずに移動しますか？");
  }
  return true;
}

/* 一覧のソート・絞り込み状態（画面を行き来しても保持） */
let listSort = "asc";      // 残額一覧：期限順（asc=近い順）
let masterQuery = "";      // マスタ一覧：コード・銘柄名の検索
let masterAccount = "all"; // マスタ一覧：証券口座での絞り込み
let masterSort = "code";   // マスタ一覧：並び順

/* 銘柄コード→銘柄名の対応表（stocks.json：JPX東証上場銘柄一覧由来） */
let stockMap = null;
async function loadStockMap(){
  if(stockMap) return stockMap;
  try{
    const res = await fetch("./stocks.json");
    stockMap = res.ok ? await res.json() : {};
  }catch(e){ stockMap = {}; }
  return stockMap;
}

const $ = s => document.querySelector(s);
const app = $("#app");
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove("show"), 2600);
}
function todayISO(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function lastDayISO(year, monthIndex){ // monthIndexは0始まり、翌月0日=月末
  const d = new Date(year, monthIndex + 1, 0);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtDate(iso){ return iso ? iso.replaceAll("-","/") : "－"; }
function fmtDateTime(ts){
  if(!ts) return "－";
  const d = new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function unit(t){ return t === "枚数" ? "枚" : "円"; }
function fmtNum(n){ return Number(n ?? 0).toLocaleString("ja-JP"); }
function daysLeft(iso){
  const t = new Date(todayISO()); const e = new Date(iso);
  return Math.round((e - t) / 86400000);
}
function daysChip(iso){
  const d = daysLeft(iso);
  if(d < 0)   return `<span class="chip days-danger">期限切れ</span>`;
  if(d <= 30) return `<span class="chip days-danger">あと${d}日</span>`;
  if(d <= 90) return `<span class="chip days-warn">あと${d}日</span>`;
  return `<span class="chip days-ok">あと${d}日</span>`;
}
function acctChip(a){ return `<span class="chip acct ${esc(a)}">${esc(a)}</span>`; }

/* ---------------- データ取得 ---------------- */
async function loadAll(){
  const [m, b] = await Promise.all([
    sb.from("yutai_master").select("*").order("code"),
    sb.from("yutai_balance").select("*").order("expiry")
  ]);
  if(m.error) throw m.error;
  if(b.error) throw b.error;
  masters = m.data; balances = b.data;
  // 残額ログ（テーブル未作成でも他画面は動くよう、エラーは握りつぶして印だけ残す）
  try{
    const l = await sb.from("yutai_log").select("*");
    if(l.error){ logs = null; console.warn(l.error); }
    else logs = l.data;
  }catch(e){ logs = null; console.warn(e); }
}

/* ---------------- 優待の自動登録 ----------------
   アプリ起動時に判定：優待月の1日を過ぎていて、
   PK（コード×口座×有効期限）が未作成なら残額データを生成する */
function computeExpiry(month, expMonths, base){
  const t = base ?? new Date();
  let y = t.getFullYear();
  if(t < new Date(y, month - 1, 1)) y -= 1;      // 直近の優待月（1日基準）
  return lastDayISO(y, (month - 1) + Number(expMonths)); // n か月後の月末
}
async function autoGenerate(target){
  // target指定時（マスタ登録・更新直後）はそのマスタのみ処理。
  // 各マスタの generated_until（どの優待月1日まで生成済みか）を見て、
  // 未処理の優待月だけを対象にするため、意図的に削除した行は復活しない。
  const today = todayISO();
  const exists = new Set(balances.map(r => `${r.code}|${r.account}|${r.expiry}`));
  const rows = [];
  const genUpdates = [];
  const list = target
    ? masters.filter(m => m.code === target.code && m.account === target.account)
    : masters;
  for(const m of list){
    const kais = [[m.month1, m.expiry_months1, m.amount1]];
    if(Number(m.times_per_year) === 2) kais.push([m.month2, m.expiry_months2, m.amount2]);
    let maxOcc = m.generated_until ?? null;
    for(const [mo, em, amt] of kais){
      if(!mo || !em) continue;
      const t = new Date();
      let y = t.getFullYear();
      if(t < new Date(y, Number(mo) - 1, 1)) y -= 1;          // 直近の優待月（1日基準）
      const occ = `${y}-${String(mo).padStart(2,"0")}-01`;     // その優待月の1日
      if(m.generated_until && occ <= m.generated_until) continue; // 生成済みの期はスキップ
      if(!maxOcc || occ > maxOcc) maxOcc = occ;
      const expiry = lastDayISO(y, (Number(mo) - 1) + Number(em));
      if(expiry < today) continue;                             // 期限切れ分は作らない
      const key = `${m.code}|${m.account}|${expiry}`;
      if(exists.has(key)) continue;
      exists.add(key);
      rows.push({
        code:m.code, account:m.account, expiry,
        name:m.name, format:m.format, benefit_type:m.benefit_type,
        amount:amt ?? 0, balance:amt ?? 0,
        url:m.url, login_id:m.login_id, login_pass:m.login_pass,
        memo_master:m.memo, memo_tran:"",
        received:false,
        created_at:new Date().toISOString(), updated_at:new Date().toISOString()
      });
    }
    if(maxOcc && maxOcc !== (m.generated_until ?? null)){
      genUpdates.push({ code:m.code, account:m.account, generated_until:maxOcc });
    }
  }
  if(rows.length === 0 && genUpdates.length === 0) return;
  if(rows.length > 0){
    const { error } = await sb.from("yutai_balance")
      .upsert(rows, { onConflict:"code,account,expiry", ignoreDuplicates:true });
    if(error){ console.error(error); return; }
  }
  for(const u of genUpdates){
    const { error } = await sb.from("yutai_master")
      .update({ generated_until:u.generated_until })
      .match({ code:u.code, account:u.account });
    if(error) console.error(error);
  }
  await loadAll();
  if(rows.length > 0) toast(`優待を自動登録しました（${rows.length}件）`);
}

/* ---------------- 画面：残高一覧 ---------------- */
function groupBalances(){
  const map = new Map();
  for(const r of balances){
    const key = `${r.code}__${r.expiry}`;
    if(!map.has(key)) map.set(key, { key, code:r.code, expiry:r.expiry, name:r.name, benefit_type:r.benefit_type, total:0, recv:0, rows:[] });
    const g = map.get(key);
    g.total += Number(r.balance ?? 0);
    if(r.received) g.recv += 1;
    g.rows.push(r);
  }
  return [...map.values()].sort((a,b)=> a.expiry === b.expiry ? a.code.localeCompare(b.code) : a.expiry.localeCompare(b.expiry));
}
function renderList(){
  view = { name:"list" };
  setNav("list");
  let groups = groupBalances();
  if(listMonths.size > 0){
    groups = groups.filter(g => listMonths.has(g.expiry.slice(0,7)));
  }
  let visible = groups.filter(g => showUsed || g.total > 0);
  if(showUnrecvOnly) visible = visible.filter(g => g.recv < g.rows.length);  // 未受取が1件でもある銘柄のみ
  if(listSort === "desc") visible = [...visible].reverse();
  else if(listSort === "codeAsc")  visible = [...visible].sort((a,b)=> a.code.localeCompare(b.code) || a.expiry.localeCompare(b.expiry));
  else if(listSort === "codeDesc") visible = [...visible].sort((a,b)=> b.code.localeCompare(a.code) || a.expiry.localeCompare(b.expiry));

  // 通知：期限まで1か月以内で残額がある銘柄（絞り込みに関係なく全体から判定）
  const expiring = groupBalances().filter(g => g.total > 0 && daysLeft(g.expiry) >= 0 && daysLeft(g.expiry) <= 31);

  // ヘッダ集計（表示中のデータが対象。金額と枚数は分けて集計）
  const codeSet  = new Set(visible.map(g => g.code));
  const yenTotal = visible.filter(g => g.benefit_type !== "枚数").reduce((s,g)=> s + g.total, 0);
  const maiTotal = visible.filter(g => g.benefit_type === "枚数").reduce((s,g)=> s + g.total, 0);
  // 期限月チップ：残額データが存在する月だけをyyyy/mm形式で動的に生成（複数選択可）
  const monthSet = [...new Set(balances.map(r => r.expiry.slice(0,7)))].sort();
  const monthChips = monthSet.map(ym =>
    `<button type="button" class="fchip ${listMonths.has(ym) ? "on" : ""}" data-ym="${ym}">${ym.replace("-","/")}</button>`).join("");

  let html = `
    <h2 style="margin-bottom:8px;">優待残高（日付別）</h2>
    ${(!noticeDismissed && expiring.length > 0) ? `
    <div class="notice">
      <span>⏰ 期限まで1か月以内：${expiring.slice(0,3).map(g=>esc(g.name)).join("、")}${expiring.length > 3 ? ` 他${expiring.length-3}件` : ""}</span>
      <button id="notice-x" aria-label="閉じる">×</button>
    </div>` : ""}
    <div class="row-between" style="margin-bottom:10px;">
      <label class="switch"><input type="checkbox" id="sw-unrecv" ${showUnrecvOnly?"checked":""}><span class="sw-track"></span>受取なしのみ</label>
      <label class="switch"><input type="checkbox" id="sw-used" ${showUsed?"checked":""}><span class="sw-track"></span>使用済も表示</label>
    </div>
    <div class="summary">
      <div><span class="s-label">銘柄数</span><span class="s-val">${codeSet.size}<small> 銘柄</small></span></div>
      <div><span class="s-label">金額合計</span><span class="s-val">${fmtNum(yenTotal)}<small> 円</small></span></div>
      <div><span class="s-label">枚数合計</span><span class="s-val">${fmtNum(maiTotal)}<small> 枚</small></span></div>
    </div>
    ${monthSet.length > 0 ? `
    <div class="chipbar">
      <button type="button" class="fchip ${listMonths.size === 0 ? "on" : ""}" data-ym="all">すべて</button>
      ${monthChips}
    </div>` : ""}
    <div class="toolbar">
      <select id="f-sort">
        <option value="asc" ${listSort==="asc"?"selected":""}>期限が近い順</option>
        <option value="desc" ${listSort==="desc"?"selected":""}>期限が遠い順</option>
        <option value="codeAsc" ${listSort==="codeAsc"?"selected":""}>コード昇順</option>
        <option value="codeDesc" ${listSort==="codeDesc"?"selected":""}>コード降順</option>
      </select>
    </div>`;
  if(visible.length === 0){
    html += (listMonths.size > 0)
      ? `<div class="empty">この条件に合う優待がありません。<br>月の絞り込みを「すべて」に戻すと全件表示されます。</div>`
      : `<div class="empty">表示できる優待がありません。<br>まず「銘柄マスタ」から銘柄を登録すると、<br>優待月に残額データが自動作成されます。</div>`;
  }else{
    for(const g of visible){
      const used = g.total <= 0;
      html += `
      <div class="ticket" data-key="${esc(g.key)}">
        <div class="t-main">
          <div class="t-code">${esc(g.code)}</div>
          <div class="t-name">${esc(g.name)}</div>
          <div class="t-meta">
            ${daysChip(g.expiry)}
            <span class="chip ${g.recv === g.rows.length ? "days-ok" : "days-warn"}">${g.recv}/${g.rows.length}受取済</span>
            ${used ? `<span class="chip used">使用済</span>` : ""}
          </div>
          <div class="t-sub">
            ${[...g.rows].sort((a,b)=>a.account.localeCompare(b.account)).map(r => `
            <div class="t-subrow">
              <span class="chip acct ${esc(r.account)}">${esc(r.account)}</span>
              <span class="t-subbal">${fmtNum(r.balance ?? 0)}<small>${unit(g.benefit_type)}</small></span>
              <span class="t-substat ${r.received ? "ok" : "ng"}">${r.received ? "受取済" : "未受取"}</span>
            </div>`).join("")}
          </div>
        </div>
        <div class="t-stub">
          <div class="t-balance ${used?"zero":""}">${fmtNum(g.total)}<small>${unit(g.benefit_type)}</small></div>
          ${(p => p !== null ? `<div class="t-pace">${fmtNum(p)}${unit(g.benefit_type)}/月</div>` : "")(paceOf(g.total, g.expiry))}
          <div class="t-exp">期限 ${fmtDate(g.expiry)}</div>
        </div>
      </div>`;
    }
  }
  html += `<div style="height:60px;"></div>`;
  app.innerHTML = html;
  const sw = $("#sw-used");
  if(sw) sw.onchange = e => { showUsed = e.target.checked; renderList(); };
  const nx = $("#notice-x");
  if(nx) nx.onclick = e => { e.stopPropagation(); noticeDismissed = true; renderList(); };
  $("#sw-unrecv").onchange = e => { showUnrecvOnly = e.target.checked; renderList(); };
  app.querySelectorAll(".fchip").forEach(ch => ch.onclick = () => {
    const ym = ch.dataset.ym;
    if(ym === "all") listMonths.clear();
    else listMonths.has(ym) ? listMonths.delete(ym) : listMonths.add(ym);
    renderList();
  });
  $("#f-sort").onchange  = e => { listSort  = e.target.value; renderList(); };
  lastList = renderList;
  app.querySelectorAll(".ticket").forEach(el => el.onclick = () => renderDetail(el.dataset.key));
  setFab("＋ 残額データを追加", renderBalanceAdd);
}

/* ---------------- 画面：残高一覧（銘柄別） ---------------- */
function groupByCode(){
  const map = new Map();
  for(const r of balances){
    if(!map.has(r.code)) map.set(r.code, { code:r.code, name:r.name, benefit_type:r.benefit_type, total:0, subs:new Map() });
    const g = map.get(r.code);
    g.name = r.name; g.benefit_type = r.benefit_type;
    g.total += Number(r.balance ?? 0);
    g.subs.set(r.expiry, (g.subs.get(r.expiry) ?? 0) + Number(r.balance ?? 0));
  }
  return [...map.values()].map(g => ({
    ...g,
    subs:[...g.subs.entries()].map(([expiry, total]) => ({ expiry, total })).sort((a,b)=> a.expiry.localeCompare(b.expiry))
  }));
}
function renderByCode(){
  view = { name:"byCode" };
  setNav("bycode");
  let groups = groupByCode().filter(g => g.total > 0);
  if(byCodeSort === "codeAsc")       groups.sort((a,b)=> a.code.localeCompare(b.code));
  else if(byCodeSort === "codeDesc") groups.sort((a,b)=> b.code.localeCompare(a.code));
  else if(byCodeSort === "balDesc")  groups.sort((a,b)=> b.total - a.total || a.code.localeCompare(b.code));
  else if(byCodeSort === "balAsc")   groups.sort((a,b)=> a.total - b.total || a.code.localeCompare(b.code));

  let html = `
    <h2 style="margin-bottom:8px;">優待残高（銘柄別）</h2>
    <div class="toolbar">
      <select id="bc-sort">
        <option value="codeAsc" ${byCodeSort==="codeAsc"?"selected":""}>コード昇順</option>
        <option value="codeDesc" ${byCodeSort==="codeDesc"?"selected":""}>コード降順</option>
        <option value="balDesc" ${byCodeSort==="balDesc"?"selected":""}>残額が大きい順</option>
        <option value="balAsc" ${byCodeSort==="balAsc"?"selected":""}>残額が小さい順</option>
      </select>
    </div>`;
  if(groups.length === 0){
    html += `<div class="empty">残額のある優待がありません。</div>`;
  }else{
    for(const g of groups){
      const subs = g.subs.filter(s => s.total > 0);
      html += `
      <div class="ticket" data-code="${esc(g.code)}">
        <div class="t-main">
          <div class="t-code">${esc(g.code)}</div>
          <div class="t-name">${esc(g.name)}</div>
          <div class="t-sub">
            ${subs.map(s => `
            <div class="t-subrow">
              ${daysChip(s.expiry)}
              <span style="font-size:11px; color:var(--muted);">期限 ${fmtDate(s.expiry)}</span>
              <span class="t-subbal">${fmtNum(s.total)}<small>${unit(g.benefit_type)}</small></span>
            </div>`).join("")}
          </div>
        </div>
        <div class="t-stub">
          <div class="t-balance">${fmtNum(g.total)}<small>${unit(g.benefit_type)}</small></div>
          <div class="t-exp">全期限合計</div>
        </div>
      </div>`;
    }
  }
  html += `<div style="height:60px;"></div>`;
  app.innerHTML = html;
  $("#bc-sort").onchange = e => { byCodeSort = e.target.value; renderByCode(); };
  lastList = renderByCode;
  app.querySelectorAll(".ticket").forEach(el => el.onclick = () => {
    const g = groups.find(x => x.code === el.dataset.code);
    const subs = g.subs.filter(s => s.total > 0);
    if(subs.length === 1){ renderDetail(`${g.code}__${subs[0].expiry}`); return; }
    openExpiryModal(g, subs);
  });
  setFab("＋ 残額データを追加", renderBalanceAdd);
}
/* 複数の有効期限がある場合、どの期限を編集するかを選択するモーダル */
function openExpiryModal(g, subs){
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `
    <div class="modal">
      <h3>${esc(g.name)}</h3>
      <div class="sub">編集する有効期限を選択してください</div>
      ${subs.map(s => `
      <button type="button" class="modal-opt" data-expiry="${esc(s.expiry)}">
        <span>期限 ${fmtDate(s.expiry)}</span>
        <span class="mo-bal">${fmtNum(s.total)}${unit(g.benefit_type)}</span>
      </button>`).join("")}
      <button type="button" class="modal-cancel">キャンセル</button>
    </div>`;
  bg.onclick = e => { if(e.target === bg) bg.remove(); };
  bg.querySelector(".modal-cancel").onclick = () => bg.remove();
  bg.querySelectorAll(".modal-opt").forEach(b => b.onclick = () => {
    const expiry = b.dataset.expiry;
    bg.remove();
    renderDetail(`${g.code}__${expiry}`);
  });
  document.body.appendChild(bg);
}

/* ---------------- 画面：残額ログ ---------------- */
function renderLog(){
  view = { name:"log" };
  setNav("log");
  let html = `<h2>残額ログ</h2>`;
  if(logs === null){
    html += `<div class="empty">ログ用のテーブルが未作成です。<br>SupabaseのSQL Editorで update-v7.sql を実行してください。</div>`;
  }else if(logs.length === 0){
    html += `<div class="empty">まだログがありません。<br>残額詳細の「✎ 編集」から残額を変更して更新すると、<br>消費・追加の履歴がここに記録されます。</div>`;
  }else{
    const list = [...logs].sort((a,b)=>
      String(b.used_on).localeCompare(String(a.used_on)) || a.code.localeCompare(b.code) || String(b.created_at).localeCompare(String(a.created_at)));
    for(const L of list){
      const d = Number(L.amount ?? 0);
      html += `
      <div class="ticket" style="cursor:default;">
        <div class="t-main">
          <div class="t-code">${esc(L.code)}　<span class="chip acct ${esc(L.account)}" style="font-size:9px; padding:0 6px;">${esc(L.account)}</span></div>
          <div class="t-name">${esc(L.name)}</div>
          ${L.memo ? `<div class="log-memo">${esc(L.memo)}</div>` : ""}
        </div>
        <div class="t-stub">
          <div class="t-balance ${d > 0 ? "diff-plus" : "diff-minus"}" style="font-size:16px;">${d > 0 ? "+" : "−"}${fmtNum(Math.abs(d))}<small>${unit(L.benefit_type)}</small></div>
          <div class="t-exp">使用日 ${fmtDate(L.used_on)}</div>
        </div>
      </div>`;
    }
  }
  html += `<div style="height:60px;"></div>`;
  app.innerHTML = html;
  setFab(null);
}

/* ---------------- 画面：残額詳細（証券口座タブ切替） ---------------- */
function renderDetail(key, activeAcct){
  const [code, expiry] = key.split("__");
  const rows = balances.filter(r => r.code === code && r.expiry === expiry)
    .sort((a,b)=> a.account.localeCompare(b.account));
  if(rows.length === 0){ (lastList ?? renderList)(); return; }
  view = { name:"detail", key };
  const total = rows.reduce((s,r)=> s + Number(r.balance ?? 0), 0);
  const r = rows.find(x => x.account === activeAcct) ?? rows[0];

  let html = `<button class="back" id="back">‹ 一覧に戻る</button>
    <div class="d-head">
      <div class="sub" style="color:rgba(255,255,255,.7);">${esc(code)}　期限 ${fmtDate(expiry)}　${rows.length}件</div>
      <div class="row-between">
        <div class="name">${esc(rows[0].name)}</div>
        <div class="total">${fmtNum(total)}<small style="font-size:12px;color:rgba(255,255,255,.8);"> ${unit(rows[0].benefit_type)}</small></div>
      </div>
    </div>
    <div class="acct-tabs">
      ${rows.map(x => `<button type="button" class="acct-tab ${x.account === r.account ? "on" : ""}" data-acct="${esc(x.account)}">${esc(x.account)}</button>`).join("")}
    </div>
    <div class="card">
      <div class="row-between" style="margin-bottom:8px;">
        <div>${acctChip(r.account)} <span class="chip form">${esc(r.format)}</span> <span class="chip form">${esc(r.benefit_type)}</span></div>
        <label class="switch"><input type="checkbox" id="in-received" ${r.received ? "checked" : ""}><span class="sw-track"></span>受取済</label>
      </div>
      <div class="kv"><span class="k">銘柄名</span><span class="v">${esc(r.name)}</span></div>
      <div class="kv"><span class="k">優待額</span><span class="v">${fmtNum(r.amount)}${unit(r.benefit_type)}</span></div>
      ${r.format === "電子" && r.url ? `<div class="kv"><span class="k">URL</span><span class="v"><a href="${esc(r.url)}" target="_blank" rel="noopener">サイトを開く ↗</a></span></div>` : ""}
      ${r.format === "電子" && r.login_id ? `<div class="kv"><span class="k">ID</span><span class="v">${esc(r.login_id)}<button type="button" class="copybtn" data-copy="${esc(r.login_id)}">コピー</button></span></div>` : ""}
      ${r.format === "電子" && r.login_pass ? `<div class="kv"><span class="k">PASS</span><span class="v"><span class="pw" data-pw="${esc(r.login_pass)}">••••••</span><button type="button" class="copybtn showpw">表示</button><button type="button" class="copybtn" data-copy="${esc(r.login_pass)}">コピー</button></span></div>` : ""}
      ${r.memo_master ? `<div class="kv"><span class="k">メモ(マスタ)</span><span class="v">${linkify(r.memo_master)}</span></div>` : ""}
      <div class="kv"><span class="k">登録日</span><span class="v">${fmtDateTime(r.created_at)}</span></div>
      <div class="kv"><span class="k">最終更新日</span><span class="v">${fmtDateTime(r.updated_at)}</span></div>
      <div class="field" style="margin-top:12px;"><label>有効期限（変更時はキー重複不可）</label><input type="date" id="in-expiry" value="${esc(r.expiry)}" data-orig="${esc(r.expiry)}"></div>
      <div class="field">
        <label>残額（${unit(r.benefit_type)}）</label>
        <div class="balance-edit">
          <input type="text" inputmode="numeric" id="in-balance" value="${Number(r.balance ?? 0)}" data-orig="${Number(r.balance ?? 0)}" readonly>
          <button type="button" class="qbtn" id="bal-edit-btn">✎ 編集</button>
        </div>
        <div class="pending-note" id="pending-note"></div>
      </div>
      <div class="field">
        <label>メモ(トラン)</label>
        <input type="text" id="in-memo" value="${esc(r.memo_tran)}" data-orig="${esc(r.memo_tran)}">
        <div class="memo-link" id="memo-link"></div>
      </div>
      <div class="btn-row">
        <button class="btn primary" id="save-btn">更新する</button>
        <button class="btn danger" id="del-btn" style="flex:0 0 96px;">削除</button>
      </div>
    </div>`;
  app.innerHTML = html;
  $("#back").onclick = () => { if(confirmLeaveDetail()) (lastList ?? renderList)(); };
  setFab(null);

  app.querySelectorAll(".acct-tab").forEach(t => t.onclick = () => {
    if(t.dataset.acct === r.account) return;
    if(detailHasChanges() && !confirm("変更内容が保存されていません。\n保存せずに口座を切り替えますか？")) return;
    renderDetail(key, t.dataset.acct);

    e.target.textContent = on ? "表示" : "隠す";
  });

  // 残額の編集（小画面）：任意編集・クイック減算・使用日・メモを入力し、差分をログとして保留する
  const balInp = $("#in-balance");
  const pendingNote = $("#pending-note");
  let pending = null;  // {newBal, diff, usedOn, memo} 「更新する」押下時に初めてコミット
  const origBal = Number(r.balance ?? 0);
  function syncPendingNote(){
    if(!pending){ pendingNote.innerHTML = ""; return; }
    const sign = pending.diff > 0 ? "+" : "−";
    pendingNote.innerHTML =
      `変更 <b class="${pending.diff > 0 ? "diff-plus" : "diff-minus"}">${sign}${fmtNum(Math.abs(pending.diff))}${unit(r.benefit_type)}</b>` +
      `（使用日 ${fmtDate(pending.usedOn)}${pending.memo ? "・" + esc(pending.memo) : ""}）を「更新する」でログに記録します`;
  }
  $("#bal-edit-btn").onclick = () => {
    const bg = document.createElement("div");
    bg.className = "modal-bg";
    const u = unit(r.benefit_type);
    bg.innerHTML = `
      <div class="modal">
        <h3>残額の編集</h3>
        <div class="sub">現在の残額：${fmtNum(origBal)}${u}（差分がログとして記録されます）</div>
        <div class="field">
          <label>新しい残額（${u}）</label>
          <div class="balance-edit">
            <input type="text" inputmode="numeric" id="bm-bal" value="${pending ? pending.newBal : origBal}">
            ${r.benefit_type === "枚数"
              ? `<button type="button" class="qbtn bm-minus" data-v="1">−1枚</button>`
              : `<button type="button" class="qbtn bm-minus" data-v="500">−500</button>
                 <button type="button" class="qbtn bm-minus" data-v="1000">−1,000</button>`}
            <button type="button" class="qbtn zero" id="bm-zero">使い切り</button>
          </div>
          <div class="pending-note" id="bm-diff"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>使用日</label><input type="date" id="bm-date" value="${esc(pending?.usedOn ?? todayISO())}"></div>
          <div class="field"><label>メモ（店舗名など）</label><input type="text" id="bm-memo" value="${esc(pending?.memo ?? "")}"></div>
        </div>
        <div class="btn-row" style="margin-top:4px;">
          <button class="btn primary" id="bm-apply">反映する</button>
          <button class="btn ghost" id="bm-cancel" style="flex:0 0 110px;">キャンセル</button>
        </div>
      </div>`;
    const bmBal = bg.querySelector("#bm-bal");
    const bmDiff = bg.querySelector("#bm-diff");
    function syncDiff(){
      const d = Number(bmBal.value || 0) - origBal;
      bmDiff.innerHTML = d === 0
        ? `<span style="color:var(--muted);">変更なし</span>`
        : `差分 <b class="${d > 0 ? "diff-plus" : "diff-minus"}">${d > 0 ? "+" : "−"}${fmtNum(Math.abs(d))}${u}</b>`;
    }
    bmBal.addEventListener("input", syncDiff);
    bmBal.addEventListener("focus", () => requestAnimationFrame(() => {
      const len = bmBal.value.length;
      try{ bmBal.setSelectionRange(len, len); }catch(e){}
    }));
    bg.querySelectorAll(".bm-minus").forEach(b => b.onclick = () => {
      bmBal.value = Math.max(0, Number(bmBal.value || 0) - Number(b.dataset.v));
      syncDiff();
    });
    bg.querySelector("#bm-zero").onclick = () => { bmBal.value = 0; syncDiff(); };
    bg.querySelector("#bm-cancel").onclick = () => bg.remove();
    bg.onclick = e => { if(e.target === bg) bg.remove(); };
    bg.querySelector("#bm-apply").onclick = () => {
      const newBal = Math.max(0, Number(bmBal.value || 0));
      const d = newBal - origBal;
      const usedOn = bg.querySelector("#bm-date").value;
      if(d !== 0 && !usedOn){ alert("使用日を入力してください"); return; }
      pending = d === 0 ? null : { newBal, diff:d, usedOn, memo:bg.querySelector("#bm-memo").value };
      balInp.value = newBal;
      syncPendingNote();
      bg.remove();
    };
    document.body.appendChild(bg);
    syncDiff();
  };

  // メモ(トラン)にURLが含まれる場合はリンクを表示（入力に追従）
  const memoInp = $("#in-memo");
  const memoLink = $("#memo-link");
  function syncMemoLink(){
    const m = (memoInp.value.match(/https?:\/\/[^\s<>"']+/) || [])[0];
    memoLink.innerHTML = m ? `<a href="${esc(m)}" target="_blank" rel="noopener">↗ メモ内のリンクを開く</a>` : "";
  }
  memoInp.addEventListener("input", syncMemoLink);
  syncMemoLink();

  // 受取済トグル（切り替えた時点で即保存）
  $("#in-received").onchange = async e => {
    const checked = e.target.checked;
    const { error } = await sb.from("yutai_balance")
      .update({ received:checked, updated_at:new Date().toISOString() })
      .match({ code:r.code, account:r.account, expiry:r.expiry });
    if(error){ toast("更新に失敗しました"); e.target.checked = !checked; console.error(error); return; }
    await loadAll();
    toast(checked ? "受取済にしました" : "未受取にしました");
  };
  // 更新（有効期限・残額・メモ(トラン)を保存し、保留中の残額ログをコミット。押さずに戻ると破棄）
  $("#save-btn").onclick = async () => {
    const newExpiry = $("#in-expiry").value;
    if(!newExpiry){ toast("有効期限を入力してください"); return; }
    if(newExpiry !== r.expiry &&
       balances.some(x => x.code === r.code && x.account === r.account && x.expiry === newExpiry)){
      toast(`期限${fmtDate(newExpiry)}の同じ優待が既に存在するため変更できません`); return;
    }
    const upd = {
      expiry:newExpiry,
      balance:Number(balInp.value || 0),
      memo_tran:memoInp.value,
      updated_at:new Date().toISOString()
    };
    const { error } = await sb.from("yutai_balance").update(upd)
      .match({ code:r.code, account:r.account, expiry:r.expiry });
    if(error){ toast("更新に失敗しました"); console.error(error); return; }
    if(pending && pending.diff !== 0){
      const logRow = {
        code:r.code, account:r.account, name:r.name, benefit_type:r.benefit_type,
        used_on:pending.usedOn, memo:pending.memo || "", amount:pending.diff
      };
      const lg = await sb.from("yutai_log").insert(logRow);
      if(lg.error){ console.error(lg.error); toast("残額は更新しましたがログの記録に失敗しました（update-v7.sql実行済みかご確認ください）"); }
    }
    await loadAll(); toast("更新しました");
    renderDetail(`${r.code}__${newExpiry}`, r.account);
  };
  $("#del-btn").onclick = async () => {
    if(!confirm(`${r.name}（${r.account}）の残額データを削除します。よろしいですか？`)) return;
    const { error } = await sb.from("yutai_balance").delete()
      .match({ code:r.code, account:r.account, expiry:r.expiry });
    if(error){ toast("削除に失敗しました"); console.error(error); return; }
    await loadAll(); toast("削除しました");
    const left = balances.filter(x => x.code === code && x.expiry === expiry);
    left.length ? renderDetail(key) : (lastList ?? renderList)();
  };
}

/* ---------------- 画面：残額データの追加 ---------------- */
function renderBalanceAdd(){
  view = { name:"balanceAdd" };
  setFab(null);
  if(masters.length === 0){
    app.innerHTML = `<button class="back" id="back">‹ 一覧に戻る</button><div class="empty">銘柄マスタが未登録です。<br>先に「銘柄マスタ」から銘柄を登録してください。</div>`;
    $("#back").onclick = renderList; return;
  }
  const opts = masters.map((m,i)=>`<option value="${i}">${esc(m.code)}　${esc(m.name)}（${esc(m.account)}）</option>`).join("");
  app.innerHTML = `
  <button class="back" id="back">‹ 一覧に戻る</button>
  <h2>残額データの追加</h2>
  <div class="card">
    <div id="add-err"></div>
    <div class="field"><label>銘柄（マスタから選択）</label><select id="a-master">${opts}</select></div>
    <div class="field"><label>優待回</label><select id="a-kai"></select></div>
    <div class="field"><label>有効期限</label><input type="date" id="a-expiry"></div>
    <div class="grid2">
      <div class="field"><label>優待額</label><input type="number" inputmode="numeric" id="a-amount"></div>
      <div class="field"><label>残額</label><input type="number" inputmode="numeric" id="a-balance"></div>
    </div>
    <div class="field"><label>メモ(トラン)</label><input type="text" id="a-memo"></div>
    <div class="field">
      <label class="switch"><input type="checkbox" id="a-received" checked><span class="sw-track"></span>受取済として登録する</label>
    </div>
    <button class="btn primary" id="a-save">登録する</button>
  </div>`;
  $("#back").onclick = renderList;

  function syncKai(){
    const m = masters[Number($("#a-master").value)];
    const kais = [[1, m.month1, m.expiry_months1, m.amount1]];
    if(Number(m.times_per_year) === 2) kais.push([2, m.month2, m.expiry_months2, m.amount2]);
    $("#a-kai").innerHTML = kais.map(([n,mo,em,amt]) =>
      `<option value="${n}">回${n}：${mo ?? "?"}月・期限${em ?? "?"}か月後・${fmtNum(amt)}${unit(m.benefit_type)}</option>`).join("");
    syncFields();
  }
  function syncFields(){
    const m = masters[Number($("#a-master").value)];
    const n = Number($("#a-kai").value);
    const mo  = n === 2 ? m.month2 : m.month1;
    const em  = n === 2 ? m.expiry_months2 : m.expiry_months1;
    const amt = n === 2 ? m.amount2 : m.amount1;
    if(mo && em) $("#a-expiry").value = computeExpiry(Number(mo), em);
    $("#a-amount").value = amt ?? 0;
    $("#a-balance").value = amt ?? 0;
  }
  $("#a-master").onchange = syncKai;
  $("#a-kai").onchange = syncFields;
  syncKai();

  $("#a-save").onclick = async () => {
    const m = masters[Number($("#a-master").value)];
    const expiry = $("#a-expiry").value;
    if(!expiry){ $("#add-err").innerHTML = `<div class="err">有効期限を入力してください。</div>`; return; }
    if(balances.some(r => r.code === m.code && r.account === m.account && r.expiry === expiry)){
      $("#add-err").innerHTML = `<div class="err">同じキー（${esc(m.code)}／${esc(m.account)}／${fmtDate(expiry)}）の残額データが既に存在するため登録できません。</div>`;
      return;
    }
    const row = {
      code:m.code, account:m.account, expiry,
      name:m.name, format:m.format, benefit_type:m.benefit_type,
      amount:Number($("#a-amount").value || 0), balance:Number($("#a-balance").value || 0),
      url:m.url, login_id:m.login_id, login_pass:m.login_pass,
      memo_master:m.memo, memo_tran:$("#a-memo").value,
      received:$("#a-received").checked,
      created_at:new Date().toISOString(), updated_at:new Date().toISOString()
    };
    const { error } = await sb.from("yutai_balance").insert(row);
    if(error){ $("#add-err").innerHTML = `<div class="err">登録に失敗しました：${esc(error.message)}</div>`; return; }
    await loadAll(); toast("残額データを登録しました"); renderList();
  };
}

/* ---------------- 画面：銘柄マスタ一覧 ---------------- */
function renderMasterList(){
  view = { name:"masterList" };
  setNav("master");

  // 絞り込み・並び替え
  let list = masters;
  const q = masterQuery.trim().toLowerCase();
  if(q) list = list.filter(m => m.code.toLowerCase().includes(q) || (m.name ?? "").toLowerCase().includes(q));
  if(masterAccount !== "all") list = list.filter(m => m.account === masterAccount);
  list = [...list].sort((a,b) => {
    if(masterSort === "name")  return (a.name ?? "").localeCompare(b.name ?? "", "ja") || a.code.localeCompare(b.code);
    if(masterSort === "month") return (a.month1 ?? 99) - (b.month1 ?? 99) || a.code.localeCompare(b.code);
    return a.code.localeCompare(b.code) || a.account.localeCompare(b.account);
  });

  const acctOpts = ACCOUNTS.map(a=>`<option value="${a}" ${masterAccount===a?"selected":""}>${a}</option>`).join("");

  // ヘッダ集計：今年1年間（1〜12月）に受け取れる合計（回1＋回2、金額と枚数は分けて集計）
  const yearAmt = m => Number(m.amount1 || 0) + (Number(m.times_per_year) === 2 ? Number(m.amount2 || 0) : 0);
  const mCodeSet = new Set(list.map(m => m.code));
  const mYen = list.filter(m => m.benefit_type !== "枚数").reduce((s,m)=> s + yearAmt(m), 0);
  const mMai = list.filter(m => m.benefit_type === "枚数").reduce((s,m)=> s + yearAmt(m), 0);

  let html = `<h2>銘柄マスタ</h2>
    <div class="summary">
      <div><span class="s-label">銘柄数</span><span class="s-val">${mCodeSet.size}<small> 銘柄</small></span></div>
      <div><span class="s-label">年間金額（${new Date().getFullYear()}年）</span><span class="s-val">${fmtNum(mYen)}<small> 円</small></span></div>
      <div><span class="s-label">年間枚数</span><span class="s-val">${fmtNum(mMai)}<small> 枚</small></span></div>
    </div>
    <div class="toolbar">
      <input type="text" id="mf-q" placeholder="コード・銘柄名で検索" value="${esc(masterQuery)}">
    </div>
    <div class="toolbar">
      <select id="mf-acct"><option value="all">全口座</option>${acctOpts}</select>
      <select id="mf-sort">
        <option value="code" ${masterSort==="code"?"selected":""}>コード順</option>
        <option value="name" ${masterSort==="name"?"selected":""}>銘柄名順</option>
        <option value="month" ${masterSort==="month"?"selected":""}>優待月順</option>
      </select>
    </div>`;
  if(masters.length === 0){
    html += `<div class="empty">銘柄マスタが未登録です。<br>右下のボタンから登録してください。</div>`;
  }else if(list.length === 0){
    html += `<div class="empty">この条件に合う銘柄がありません。<br>検索条件や絞り込みを見直してください。</div>`;
  }else{
    // 銘柄単位に集約し、証券口座別をサブレコードとして表示
    const gmap = new Map();
    for(const m of list){
      if(!gmap.has(m.code)) gmap.set(m.code, { code:m.code, rows:[] });
      gmap.get(m.code).rows.push(m);
    }
    for(const g of gmap.values()){
      const first = g.rows[0];
      const kai = Number(first.times_per_year) === 2
        ? `${first.month1}月・${first.month2}月`
        : `${first.month1}月`;
      const gTotal = g.rows.reduce((s,m)=> s + yearAmt(m), 0);
      html += `
      <div class="ticket" data-code="${esc(g.code)}">
        <div class="t-main">
          <div class="t-code">${esc(g.code)}</div>
          <div class="t-name">${esc(first.name)}</div>
          <div class="t-meta"><span class="chip form">${esc(first.format)}</span> <span class="chip form">${esc(first.benefit_type)}</span> <span class="chip days-ok">優待月 ${kai}</span></div>
          <div class="t-sub">
            ${[...g.rows].sort((a,b)=>a.account.localeCompare(b.account)).map(m => `
            <div class="t-subrow">
              <span class="chip acct ${esc(m.account)}">${esc(m.account)}</span>
              <span class="t-subbal">${fmtNum(yearAmt(m))}<small>${unit(m.benefit_type)}/年</small></span>
              <span style="font-size:10px; color:var(--muted);">年${esc(m.times_per_year)}回</span>
            </div>`).join("")}
          </div>
        </div>
        <div class="t-stub">
          <div class="t-balance" style="font-size:15px;">${fmtNum(gTotal)}<small>${unit(first.benefit_type)}/年</small></div>
          <div class="t-exp">年間合計</div>
        </div>
      </div>`;
    }
  }
  html += `<div style="height:60px;"></div>`;
  app.innerHTML = html;
  const qEl = $("#mf-q");
  qEl.oninput = e => {
    masterQuery = e.target.value;
    const pos = qEl.selectionStart;
    renderMasterList();
    const nq = $("#mf-q"); nq.focus(); nq.setSelectionRange(pos, pos);
  };
  $("#mf-acct").onchange = e => { masterAccount = e.target.value; renderMasterList(); };
  $("#mf-sort").onchange = e => { masterSort = e.target.value; renderMasterList(); };
  app.querySelectorAll(".ticket").forEach(el => el.onclick = () => {
    const first = masters
      .filter(m => m.code === el.dataset.code)
      .sort((a,b)=> a.account.localeCompare(b.account))[0];
    if(first) renderMasterForm(first);
  });
  setFab("＋ 銘柄を登録", () => renderMasterForm(null));
}

/* ---------------- 画面：銘柄マスタ登録・編集 ---------------- */
function renderMasterForm(m, isCopy = false){

  view = { name:"masterForm" };
  setFab(null);
  const v = m ?? { code:"", name:"", account:"SBI", format:"紙", benefit_type:"金額", times_per_year:1,
                   month1:"", expiry_months1:"", amount1:"", month2:"", expiry_months2:"", amount2:"",
                   url:"", login_id:"", login_pass:"", memo:"" };

  const emOpts = sel => Array.from({length:12},(_,i)=>`<option value="${i+1}" ${Number(sel)===i+1?"selected":""}>${i+1}か月後</option>`).join("");

  app.innerHTML = `
  <button class="back" id="back">‹ マスタ一覧に戻る</button>
  <h2>${isEdit ? "銘柄マスタの編集" : isCopy ? "銘柄マスタの登録（コピー）" : "銘柄マスタの登録"}</h2>
  ${siblings.length > 1 ? `
  <div class="acct-tabs">
    ${siblings.map(x => `<button type="button" class="acct-tab ${x.account === m.account ? "on" : ""}" data-acct="${esc(x.account)}">${esc(x.account)}</button>`).join("")}
  </div>` : ""}
  <div class="card">
    <div id="m-err"></div>
    ${isCopy ? `<p class="sub" style="margin-bottom:10px;">「${esc(m.name)}（${esc(m.account)}）」の内容を引き継いでいます。コードまたは証券口座を変えて登録してください。</p>` : ""}
    <div class="grid2">
      <div class="field"><label>コード（半角英数）</label><input type="text" id="m-code" value="${esc(v.code)}" ${isEdit?"disabled":""} autocapitalize="characters" autocomplete="off"></div>
      <div class="field"><label>証券口座</label><select id="m-account" ${isEdit?"disabled":""}>${selOpts(ACCOUNTS, v.account)}</select></div>
    </div>
    ${isEdit ? `<p class="sub" style="margin:-6px 0 10px;">コードと証券口座はキー項目のため変更できません。</p>` : ""}
    <div class="field"><label>銘柄名</label><input type="text" id="m-name" value="${esc(v.name)}"></div>
    <div class="grid2">
      <div class="field"><label>形式</label><select id="m-format">${selOpts(FORMATS, v.format)}</select></div>
      <div class="field"><label>優待種類</label><select id="m-type">${selOpts(TYPES, v.benefit_type)}</select></div>
    </div>
    <div class="field"><label>年優待回数</label>
      <div class="seg">
        <button type="button" id="times1" class="${Number(v.times_per_year)!==2?"on":""}">年1回</button>
        <button type="button" id="times2" class="${Number(v.times_per_year)===2?"on":""}">年2回</button>
      </div>
    </div>
    ${kaiBlock(1, v.month1, v.expiry_months1, v.amount1)}
    ${kaiBlock(2, v.month2, v.expiry_months2, v.amount2)}
    <div id="digital-block">
      <div class="field"><label>URL（電子のみ）</label><input type="url" id="m-url" value="${esc(v.url)}" autocomplete="off"></div>
      <div class="grid2">
        <div class="field"><label>ID（電子のみ）</label><input type="text" id="m-id" value="${esc(v.login_id)}" autocomplete="off"></div>
        <div class="field"><label>PASS（電子のみ）</label><input type="text" id="m-pass" value="${esc(v.login_pass)}" autocomplete="off"></div>
      </div>
    </div>
    <div class="field"><label>メモ(マスタ)</label><input type="text" id="m-memo" value="${esc(v.memo)}"></div>
    <button class="btn primary" id="m-save">${isEdit ? "更新する" : "登録する"}</button>
    ${isEdit ? `<div class="btn-row">
      <button class="btn ghost" id="m-copy">コピーして新規作成</button>
      <button class="btn danger" id="m-del" style="flex:0 0 110px;">削除</button>
    </div>` : ""}
  </div>`;
  $("#back").onclick = renderMasterList;
  app.querySelectorAll(".acct-tab").forEach(t => t.onclick = () => {
    if(t.dataset.acct === m.account) return;
    const next = siblings.find(x => x.account === t.dataset.acct);
    if(next) renderMasterForm(next);
  });

  let times = Number(v.times_per_year) === 2 ? 2 : 1;
  function syncTimes(){
    $("#times1").classList.toggle("on", times === 1);
    $("#times2").classList.toggle("on", times === 2);
    $("#kai2").style.display = times === 2 ? "" : "none";
  }
  $("#times1").onclick = () => { times = 1; syncTimes(); };
  $("#times2").onclick = () => { times = 2; syncTimes(); };
  function syncDigital(){
    $("#digital-block").style.display = $("#m-format").value === "電子" ? "" : "none";
  }
  $("#m-format").onchange = syncDigital;
  syncTimes(); syncDigital();

  // コード入力時に銘柄名を自動入力（stocks.json：東証上場銘柄一覧由来。手入力で上書き可）
  if(!isEdit){
    loadStockMap(); // 先読み
    if(isCopy) $("#m-name").dataset.auto = "1"; // コピー時はコード変更で銘柄名も追従
    $("#m-code").addEventListener("input", async e => {
      const code = e.target.value.trim().toUpperCase();
      if(!/^[0-9][0-9A-Z]{3}$/.test(code)) return;
      const map = await loadStockMap();
      const nm = map[code];
      const nameEl = $("#m-name");
      if(nm && (!nameEl.value.trim() || nameEl.dataset.auto === "1")){
        nameEl.value = nm;
        nameEl.dataset.auto = "1";
      }
    });
    $("#m-name").addEventListener("input", e => { e.target.dataset.auto = "0"; });
  }

  $("#m-save").onclick = async () => {
    const code = ($("#m-code").value || "").trim();
    const errBox = $("#m-err");
    if(!/^[A-Za-z0-9]+$/.test(code)){ errBox.innerHTML = `<div class="err">コードは半角英数で入力してください。</div>`; return; }
    if(!$("#m-name").value.trim()){ errBox.innerHTML = `<div class="err">銘柄名を入力してください。</div>`; return; }
    if(!$("#m-month1").value || !$("#m-em1").value){ errBox.innerHTML = `<div class="err">回1の優待月と有効期限を選択してください。</div>`; return; }
    if(times === 2 && (!$("#m-month2").value || !$("#m-em2").value)){ errBox.innerHTML = `<div class="err">回2の優待月と有効期限を選択してください。</div>`; return; }
    const account = $("#m-account").value;
    if(!isEdit && masters.some(x => x.code === code && x.account === account)){
      errBox.innerHTML = `<div class="err">同じコード×証券口座のマスタが既に存在します。</div>`; return;
    }
    const digital = $("#m-format").value === "電子";
    const row = {
      code, account,
      name:$("#m-name").value.trim(),
      format:$("#m-format").value,
      benefit_type:$("#m-type").value,
      times_per_year:times,
      month1:Number($("#m-month1").value), expiry_months1:Number($("#m-em1").value), amount1:Number($("#m-amount1").value || 0),
      month2:times === 2 ? Number($("#m-month2").value) : null,
      expiry_months2:times === 2 ? Number($("#m-em2").value) : null,
      amount2:times === 2 ? Number($("#m-amount2").value || 0) : null,
      url:digital ? $("#m-url").value : "",
      login_id:digital ? $("#m-id").value : "",
      login_pass:digital ? $("#m-pass").value : "",
      memo:$("#m-memo").value,
      updated_at:new Date().toISOString()
    };
    let error;
    if(isEdit){
      ({ error } = await sb.from("yutai_master").update(row).match({ code, account }));
      // 銘柄名を変更した場合は、既存の残額データの名称にも反映する
      if(!error && row.name !== m.name){
        const nameUpd = await sb.from("yutai_balance").update({ name:row.name }).match({ code, account });
        if(nameUpd.error) console.error(nameUpd.error);
        else toast("残額データの銘柄名にも反映しました");
      }
    }else{
      row.created_at = new Date().toISOString();
      ({ error } = await sb.from("yutai_master").insert(row));
    }
    if(error){ errBox.innerHTML = `<div class="err">保存に失敗しました：${esc(error.message)}</div>`; return; }
    await loadAll();
    await autoGenerate({ code, account });   // 保存した銘柄のみを対象に自動作成を判定
    toast(isEdit ? "マスタを更新しました" : "マスタを登録しました");
    renderMasterList();
  };

  if(isEdit){
    $("#m-copy").onclick = () => renderMasterForm(m, true);
    $("#m-del").onclick = async () => {
      if(!confirm(`${m.name}（${m.account}）のマスタを削除します。\n登録済みの残額データは削除されません。よろしいですか？`)) return;
      const { error } = await sb.from("yutai_master").delete().match({ code:m.code, account:m.account });
      if(error){ toast("削除に失敗しました"); console.error(error); return; }
      await loadAll(); toast("マスタを削除しました"); renderMasterList();
    };
  }
}

/* ---------------- 共通UI ---------------- */
let fabEl = null;
function setFab(label, handler){
  if(fabEl){ fabEl.remove(); fabEl = null; }
  if(!label) return;
  fabEl = document.createElement("button");
  fabEl.className = "fab"; fabEl.textContent = label; fabEl.onclick = handler;
  document.body.appendChild(fabEl);
}
function setNav(active){
  $("#nav-list").classList.toggle("active", active === "list");
  $("#nav-bycode").classList.toggle("active", active === "bycode");
  $("#nav-log").classList.toggle("active", active === "log");
  $("#nav-master").classList.toggle("active", active === "master");
}
$("#nav-list").onclick = () => { if(confirmLeaveDetail()) renderList(); };
$("#nav-bycode").onclick = () => { if(confirmLeaveDetail()) renderByCode(); };
$("#nav-log").onclick = () => { if(confirmLeaveDetail()) renderLog(); };
$("#nav-master").onclick = () => { if(confirmLeaveDetail()) renderMasterList(); };

/* ---------------- 起動 ---------------- */
async function boot(){
  if(SUPABASE_URL.includes("YOUR-") || SUPABASE_ANON_KEY.includes("YOUR-")){
    app.innerHTML = `<div class="card"><h2>初期設定が必要です</h2>
      <p style="font-size:14px;">index.html 冒頭の <b>SUPABASE_URL</b> と <b>SUPABASE_ANON_KEY</b> を、ご自身のSupabaseプロジェクトの値に書き換えてください。あわせて setup.sql をSupabaseのSQL Editorで実行するとテーブルが作成されます。</p></div>`;
    return;
  }
  try{
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    await loadAll();
    await autoGenerate();
    renderList();
  }catch(e){
    console.error(e);
    app.innerHTML = `<div class="err">データの読み込みに失敗しました。通信環境とSupabaseの設定（URL・キー・テーブル・RLSポリシー）をご確認ください。<br><span class="sub">${esc(e.message ?? e)}</span></div>`;
  }
}
if("serviceWorker" in navigator){ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }
boot();
</script>
